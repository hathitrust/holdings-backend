name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: Version bump (auto-increments from latest release)
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
          - manual
      tag:
        description: Tag to use when version_bump is "manual" (e.g. v3.0.16)
        required: false
      push_latest:
        description: Also push :latest Docker tag?
        type: boolean
        default: false
      skip_test_check:
        description: Skip verifying tests passed on main (for testing from a branch)
        type: boolean
        default: false
      skip_release:
        description: Skip creating the GitHub release (deploy is also skipped)
        type: boolean
        default: false
      skip_deploy:
        description: Skip deploy only (release still runs)
        type: boolean
        default: false

jobs:
  compute-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      new_tag: ${{ steps.compute.outputs.new_tag }}
    steps:
      - name: Verify tests passed on main
        if: ${{ !inputs.skip_test_check }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          MAX_TRIES=10
          WAIT_TIME=60
          i=1
          while true; do
            TEST_RUN=$(gh run list \
              --repo "$REPO" \
              --workflow=tests.yml \
              --branch=main \
              --limit=10 \
              --json headSha,status,conclusion \
              | jq -r --arg sha "$HEAD_SHA" \
                '[.[] | select(.headSha == $sha)] | .[0] | "\(.status)/\(.conclusion // "pending")"')
            case "$TEST_RUN" in
              "completed/success") echo "Tests passed for $HEAD_SHA ✓"; break ;;
              "completed/"*) echo "Tests did not pass for $HEAD_SHA ($TEST_RUN)"; exit 1 ;;
              *)
                if [ "$i" -lt "$MAX_TRIES" ]; then
                  echo "No completed test run found for $HEAD_SHA (try $i/$MAX_TRIES) — waiting ${WAIT_TIME}s"
                  sleep "$WAIT_TIME"
                  i=$((i+1))
                else
                  echo "No completed test run found for $HEAD_SHA after $MAX_TRIES tries — giving up"
                  exit 1
                fi
                ;;
            esac
          done

      - name: Compute new tag
        id: compute
        env:
          GH_TOKEN: ${{ github.token }}
          BUMP: ${{ inputs.version_bump }}
          MANUAL_TAG: ${{ inputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          if [[ "$BUMP" == "manual" ]]; then
            [[ -n "$MANUAL_TAG" ]] || { echo "Tag input is required when version_bump is 'manual'"; exit 1; }
            [[ "$MANUAL_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "Tag must match vX.Y.Z format (e.g. v3.0.16)"; exit 1; }
            echo "new_tag=$MANUAL_TAG" >> "$GITHUB_OUTPUT"
          else
            LATEST=$(gh release list --repo "$REPO" --limit 1 --json tagName --jq '.[0].tagName // "v0.0.0"')
            [[ "$LATEST" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] \
              || { echo "Latest release tag '$LATEST' is not vX.Y.Z — use manual mode to specify a tag"; exit 1; }
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
            case "$BUMP" in
              patch) NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
              minor) NEW_TAG="v${MAJOR}.$((MINOR + 1)).0" ;;
              major) NEW_TAG="v$((MAJOR + 1)).0.0" ;;
            esac
            echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          fi

  tag:
    needs: compute-tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
      - name: Create and push git tag
        env:
          TAG: ${{ needs.compute-tag.outputs.new_tag }}
        run: |
          EXISTING=$(git ls-remote --tags origin "refs/tags/${TAG}")
          [[ -n "$EXISTING" ]] && { echo "Tag $TAG already exists on remote"; exit 1; } || true
          git tag "$TAG"
          git push origin "$TAG"

  build:
    needs: [compute-tag, tag]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Build Image
        uses: hathitrust/github_actions/build@v1
        with:
          image: ghcr.io/hathitrust/holdings
          img_tag: ${{ needs.compute-tag.outputs.new_tag }}
          tag: main
          push_latest: ${{ inputs.push_latest }}
          registry_token: ${{ github.token }}
          rebuild: false
          platforms: linux/amd64

  scan-image:
    needs: [compute-tag, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write
    steps:
      - name: Scan image for vulnerabilities
        uses: hathitrust/github_actions/scan-image@v1.7.0
        with:
          image-ref: ghcr.io/hathitrust/holdings:${{ needs.compute-tag.outputs.new_tag }}

  create-release:
    if: ${{ !inputs.skip_release }}
    needs: [compute-tag, scan-image]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.compute-tag.outputs.new_tag }}
          REPO: ${{ github.repository }}
        run: |
          gh release create "$TAG" \
            --repo "$REPO" \
            --title "$TAG" \
            --generate-notes \
            --latest

  deploy:
    if: ${{ !inputs.skip_deploy }}
    needs: [compute-tag, create-release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Deploy to production
        uses: hathitrust/github_actions/deploy@v1
        with:
          image: ghcr.io/hathitrust/holdings:${{ needs.compute-tag.outputs.new_tag }}
          file: environments/holdings/production/holdings-client-image.txt
          CONFIG_REPO_RW_APP_ID: ${{ vars.CONFIG_REPO_RW_APP_ID }}
          CONFIG_REPO_FULL_NAME: ${{ vars.CONFIG_REPO_FULL_NAME }}
          CONFIG_REPO_RW_KEY: ${{ secrets.CONFIG_REPO_RW_KEY }}
